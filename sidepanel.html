<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>GridPlayer</title>
    <link rel="stylesheet" href="sidepanel.css">
    <script src="i18n.js"></script>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-left">
                <select id="locale-select" class="locale-select" data-i18n-title="locale_select_title" title="語言">
                    <option value="zh_TW">繁中</option>
                    <option value="zh_CN">简中</option>
                    <option value="en">EN</option>
                    <option value="ja">日本語</option>
                </select>
                <button id="btn-theme-toggle" class="btn-theme-toggle" title="切換主題">☀</button>
                <span class="app-logo">&#9654;</span>
                <span class="app-title">GridPlayer</span>
                <div class="layout-switcher">
                    <button id="layout-2x2" class="btn-layout active">2&times;2</button>
                    <button id="layout-3x3" class="btn-layout">3&times;3</button>
                    <button id="layout-4x4" class="btn-layout">4&times;4</button>
                    <button id="layout-5x5" class="btn-layout">5&times;5</button>
                </div>
                <div class="btn-group-panel">
                    <button id="btn-copy-urls" class="btn-paste" data-i18n="btn_copy">複製</button>
                    <button id="btn-paste-urls" class="btn-paste" data-i18n="btn_paste">貼上</button>
                    <button id="btn-export-groups" class="btn-paste" data-i18n="btn_export" data-i18n-title="btn_export_groups">匯出</button>
                    <button id="btn-import-groups" class="btn-paste" data-i18n="btn_import" data-i18n-title="btn_import_groups">匯入</button>
                    <input type="file" id="import-file-input" accept=".json" style="display:none">
                    <button id="btn-compact" class="btn-paste" data-i18n="btn_compact" style="display:none">重排</button>
                    <button id="btn-save-quick" class="btn-paste" data-i18n="btn_save_quick" style="display:none">儲存</button>
                </div>
                <div class="btn-group-panel">
                    <button id="btn-pause-all" class="btn-paste" data-i18n="btn_pause_all">暫停</button>
                    <button id="btn-resume-all" class="btn-paste" data-i18n="btn_resume_all">繼續</button>
                    <button id="btn-mute-all" class="btn-paste" data-i18n="btn_mute_all">靜音</button>
                    <button id="btn-unmute-all" class="btn-paste" data-i18n="btn_unmute_all">取消靜音</button>
                </div>
            </div>
            <div class="topbar-right">
                <div class="btn-group-panel">
                    <a id="btn-coffee" class="btn-coffee" href="https://buymeacoffee.com/arthurwang" target="_blank" data-i18n-title="btn_coffee_title">☕</a>
                    <button id="btn-open-popup" class="btn-popup" data-i18n="btn_open_popup" data-i18n-title="btn_open_popup_title" title="在彈出視窗開啟（無瀏覽器工具列）">⧉ 開新視窗</button>
                    <button id="btn-open-tab" class="btn-tab" data-i18n="btn_open_tab" data-i18n-title="btn_open_tab_title" title="在新分頁開啟">❐ 開啟分頁</button>
                    <button id="btn-save-group" class="btn-memory" data-i18n="btn_save_group" style="display:none">記憶</button>
                    <button id="btn-clear-all" class="btn-clear" data-i18n="btn_clear_all" style="display:none">清空</button>
                    <button id="btn-toggle-groups" class="btn-toggle-groups" title="收合群組列">▲</button>
                    <input type="file" id="import-file-input" accept=".json" style="display:none">
                </div>
            </div>
        </header>
        <!-- Platform icon bar — click navigates the active tab to that platform. -->
        <div id="platforms-bar" class="platforms-bar">
            <a class="platform-btn" data-url="https://www.youtube.com"  title="YouTube">    <img src="icons/icon-youtube.png"     alt="YouTube"></a>
            <a class="platform-btn" data-url="https://www.twitch.tv"    title="Twitch">     <img src="icons/icon-twitch.png"      alt="Twitch"></a>
            <a class="platform-btn" data-url="https://vimeo.com"        title="Vimeo">      <img src="icons/icon-vimeo.png"       alt="Vimeo"></a>
            <a class="platform-btn platform-btn--nicovideo" data-url="https://www.nicovideo.jp" title="NicoNico"><img src="icons/icon-nicovideo.png" alt="NicoNico"></a>
            <a class="platform-btn" data-url="https://www.bitchute.com" title="BitChute">   <img src="icons/icon-bitchute.png"    alt="BitChute"></a>
            <a class="platform-btn" data-url="https://odysee.com"       title="Odysee">     <img src="icons/icon-odysee.png"      alt="Odysee"></a>
            <!-- Adult-content toggle: hides/shows all platform-btn--porn icons -->
            <label class="porn-toggle" id="porn-toggle" data-i18n-title="porn_toggle_title">
                <input type="checkbox" id="chk-porn-toggle">
                <span class="porn-toggle-slider"></span>
            </label>
            <a class="platform-btn platform-btn--porn" data-url="https://www.pornhub.com"  title="PornHub">    <img src="icons/icon-pornhub.png"     alt="PornHub"></a>
            <a class="platform-btn platform-btn--porn" data-url="https://www.xvideos.com"  title="XVideos">    <img src="icons/icon-xvideos.png"     alt="XVideos"></a>
            <a class="platform-btn platform-btn--porn" data-url="https://www.xnxx.com"     title="XNXX">       <img src="icons/icon-xnxx.png"        alt="XNXX"></a>
            <a class="platform-btn platform-btn--porn" data-url="https://xgroovy.com"      title="XGroovy">    <img src="icons/icon-xgroovy.png"     alt="XGroovy"></a>
            <a class="platform-btn platform-btn--porn" data-url="https://xhamster.com"     title="XHamster">   <img src="icons/icon-xhamster.png"    alt="XHamster"></a>
            <a class="platform-btn platform-btn--porn" data-url="https://rule34video.com"  title="Rule34Video"><img src="icons/icon-rule34video.png" alt="Rule34Video"></a>
        </div>

        <div id="groups-bar" class="groups-bar" style="display:none"></div>

        <div id="video-grid" class="video-grid count-4">

            <!-- Screen 1 -->
            <div class="screen-card" id="wrapper1">
                <div class="screen-box">
                    <iframe id="screen1" src="about:blank" allow="autoplay; encrypted-media; fullscreen"></iframe>
                    <div class="screen-placeholder" id="placeholder1">
                        <button class="plus-circle" data-frame="1">+</button>
                        <span class="cell-label" data-i18n="cell_label" data-i18n-arg="1">格 1</span>
                    </div>
                    <div class="input-overlay" id="input-overlay1">
                        <div class="input-box">
                            <input type="text" id="url1" class="url-input" data-i18n-placeholder="input_placeholder" placeholder="貼上 URL 或影片 ID">
                            <div class="overlay-btns">
                                <button class="btn-go load-btn" data-frame="1" data-i18n="btn_load">播放</button>
                                <button class="btn-overlay-cancel cancel-btn" data-frame="1" data-i18n="btn_cancel_input">取消</button>
                            </div>
                        </div>
                    </div>
                    <div class="hover-controls">
                        <button class="btn-ctrl play-btn" data-frame="1" title="Play">&#9654;</button>
                        <button class="btn-ctrl pause-btn" data-frame="1" title="Pause">⏸</button>
                        <button class="btn-ctrl reload-btn" data-frame="1" title="Reload">&#8635;</button>
                        <button class="btn-ctrl stop-btn" data-frame="1" title="Stop">&#9632;</button>
                        <button class="btn-ctrl skip-btn" data-frame="1" title="Next">&#9197;</button>
                    </div>
                </div>
            </div>
